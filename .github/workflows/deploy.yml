name: Deploy Run (run.movmais.com)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "🚀 Deploy com Zero Downtime"
        uses: appleboy/ssh-action@master
        env:
          ENV: ${{ secrets.ENV }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ENV
          command_timeout: 10m
          connect_timeout: 30s
          retry_count: 3
          script: |
            set -e
            echo "=========================================="
            echo "🚀 INICIANDO DEPLOY DO RUN"
            echo "=========================================="
            date

            # 1. Atualizar código
            echo ""
            echo "📥 Atualizando código..."
            cd /opt/movmais/apps/run
            git pull origin main

            # 2. Criar arquivo .env a partir do secret ENV
            echo ""
            echo "📝 Criando arquivo .env..."
            printf '%s' "$ENV" > /opt/movmais/apps/run/.env
            echo "" >> /opt/movmais/apps/run/.env
            echo "✅ .env criado com $(grep -c '=' /opt/movmais/apps/run/.env) variáveis"

            # 3. Build da nova imagem (container antigo AINDA está rodando)
            echo ""
            echo "🔨 Fazendo build da nova imagem (app continua online)..."
            cd /opt/movmais
            docker-compose build run

            # 4. Subir novo container (Docker aguarda health check antes de trocar)
            echo ""
            echo "🔄 Trocando container (aguardando health check)..."
            docker-compose up -d --no-deps run

            # 5. Aguardar container ficar saudável
            echo ""
            echo "⏳ Aguardando container ficar saudável..."
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' movmais-run 2>/dev/null || echo "starting")
              echo "  Health check $i/12: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Container saudável!"
                break
              fi
              sleep 5
            done

            # 6. Verificação final
            echo ""
            echo "🔍 Verificação final..."
            FINAL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' movmais-run 2>/dev/null || echo "unknown")
            if [ "$FINAL_STATUS" != "healthy" ]; then
              echo "⚠️  Container não está healthy (status: $FINAL_STATUS), mas pode estar iniciando ainda"
            fi

            # 7. Limpeza de imagens antigas
            echo ""
            echo "🧹 Limpando imagens antigas..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "✅ DEPLOY DO RUN CONCLUÍDO!"
            echo "=========================================="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep movmais-run
